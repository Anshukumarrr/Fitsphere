services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitsphere
      POSTGRES_USER: fitsphere
      POSTGRES_PASSWORD: fitsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitsphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://fitsphere:fitsphere@postgres:5432/fitsphere
      CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/1
      EMAIL_BACKEND: anymail.backends.sendinblue.EmailBackend
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-FitSphere <noreply@fitsphere.app>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: "True"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media

  celery_worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://fitsphere:fitsphere@postgres:5432/fitsphere
      CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/1
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-FitSphere <noreply@fitsphere.app>}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  celery_beat:
    build:
      context: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://fitsphere:fitsphere@postgres:5432/fitsphere
      CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/1
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-FitSphere <noreply@fitsphere.app>}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app


volumes:
  postgres_data:
  backend_static:
  backend_media:
